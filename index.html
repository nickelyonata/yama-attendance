<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yama Restaurant Group — Attendance</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@400;500;600&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: #F5EFE6;
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 40px 20px;
  }
  .logo { font-size: 48px; margin-bottom: 16px; }
  h1 {
    font-family: 'Playfair Display', serif;
    font-size: 28px; color: #2A1506;
    margin-bottom: 6px; text-align: center;
  }
  p { color: #8A6A50; font-size: 14px; margin-bottom: 40px; text-align: center; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 16px; width: 100%; max-width: 780px;
  }
  a {
    background: #fff;
    border: 2px solid #E8DDD0;
    border-radius: 14px;
    padding: 28px 20px;
    text-align: center;
    text-decoration: none;
    color: #2A1506;
    transition: all 0.2s;
    box-shadow: 0 2px 12px rgba(42,21,6,0.08);
  }
  a:hover {
    border-color: #C8922A;
    transform: translateY(-3px);
    box-shadow: 0 6px 20px rgba(42,21,6,0.14);
  }
  .loc-icon { font-size: 32px; margin-bottom: 12px; }
  .loc-name {
    font-family: 'Playfair Display', serif;
    font-size: 16px; font-weight: 700;
    color: #2A1506; margin-bottom: 4px;
  }
  .loc-url { font-size: 11px; color: #C8922A; letter-spacing: 0.5px; }
  .coming-soon { opacity: 0.45; cursor: not-allowed; pointer-events: none; }
  footer { margin-top: 40px; font-size: 12px; color: #B09070; }
</style>
</head>
<body>
  <div class="logo">🍣</div>
  <h1>Yama Restaurant Group</h1>
  <p>Select a location to open its attendance tablet</p>

  <div class="grid">
    <a href="flamingo.html">
      <div class="loc-icon">🌸</div>
      <div class="loc-name">Yama Flamingo</div>
      <div class="loc-url">Yama 1</div>
    </a>
    <a href="spring-mountain.html">
      <div class="loc-icon">🏔️</div>
      <div class="loc-name">Yama Spring Mountain</div>
      <div class="loc-url">Yama 2</div>
    </a>
    <a href="cheyenne.html">
      <div class="loc-icon">🌵</div>
      <div class="loc-name">Yama Cheyenne</div>
      <div class="loc-url">Yama 4</div>
    </a>
    <a href="kimchi.html">
      <div class="loc-icon">🥢</div>
      <div class="loc-name">Kimchi</div>
      <div class="loc-url">Kimchi</div>
    </a>
    <a class="coming-soon">
      <div class="loc-icon">🔜</div>
      <div class="loc-name">Yama Fremont</div>
      <div class="loc-url">Coming Soon</div>
    </a>
  </div>

  <footer>Yama Restaurant Group · Attendance System v1.0</footer>
</body>
</html>
